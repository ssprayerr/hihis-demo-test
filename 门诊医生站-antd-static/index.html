<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>门诊医生站主页 - Ant Design Static</title>
    <link
      rel="stylesheet"
      href="./vendor/reset.min.css"
    />
    <style>
      :root {
        --theme-blue: #2469f2;
        --theme-blue-hover: #4d94ff;
        --theme-blue-soft: #ebf4ff;
        --theme-green: #29a33e;
        --theme-bg: #d2d3d6;
        --theme-panel: #ffffff;
        --theme-line: #dbdbdb;
        --theme-line-soft: #eeeeee;
        --theme-text: #262626;
        --theme-text-2: #666666;
        --theme-text-3: #999999;
        --theme-danger: #e03134;
        --theme-warning: #e5710b;
        --theme-success: #29a33e;
        --theme-gap: 8px;
        --theme-radius: 4px;
        --theme-header: 48px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--theme-bg);
        color: var(--theme-text);
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial,
          sans-serif;
      }

      body {
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100vh;
      }

      .page-shell {
        position: relative;
        width: 100%;
        height: 100vh;
        background: var(--theme-bg);
        overflow: hidden;
      }

      .app-topbar {
        height: 48px;
        padding: 0 16px;
        background: linear-gradient(90deg, #2f6ae8 0%, #2b68e9 55%, #2a6aea 100%);
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: #fff;
        gap: 16px;
      }

      .topbar-left,
      .topbar-right,
      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .topbar-left {
        min-width: 0;
        flex: 1 1 auto;
        overflow: hidden;
      }

      .topbar-right {
        flex: 0 0 auto;
        white-space: nowrap;
      }

      .brand-mark {
        width: 28px;
        height: 28px;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 3px;
      }

      .brand-mark span {
        display: block;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.96);
      }

      .topbar-home {
        font-size: 14px;
        line-height: 1;
        white-space: nowrap;
      }

      .doctor-entry-tab {
        height: 32px;
        padding: 0 14px;
        border-radius: 6px 6px 0 0;
        background: #fff;
        color: var(--theme-blue);
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      .doctor-entry-tab--ghost {
        background: rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.88);
      }

      .close-mark {
        opacity: 0.7;
        font-size: 12px;
      }

      .topbar-user {
        display: flex;
        align-items: center;
        gap: 10px;
        white-space: nowrap;
      }

      .topbar-avatar {
        border: 2px solid rgba(255, 255, 255, 0.45);
      }

      .workspace {
        position: relative;
        height: calc(100vh - 48px);
        padding-right: 64px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
        min-height: 0;
      }

      .strip {
        background: #fff;
        border-bottom: 1px solid var(--theme-line);
        padding: 0 8px;
      }

      .strip-patient {
        height: 40px;
        padding: 0 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: #ebf4ff;
        min-width: 0;
        flex-wrap: nowrap;
      }

      .strip-summary {
        min-height: 48px;
        padding: 0 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-width: 0;
        flex-wrap: nowrap;
      }

      .patient-left,
      .patient-right,
      .summary-actions,
      .summary-links,
      .summary-major {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .patient-left {
        min-width: 0;
        flex: 1;
        flex-wrap: nowrap;
        overflow: hidden;
      }

      .patient-right {
        flex: 0 0 auto;
        flex-wrap: nowrap;
        white-space: nowrap;
      }

      .patient-tabs-wrap {
        min-width: 0;
        flex: 1;
        overflow: hidden;
      }

      .patient-card-tabs .ant-tabs-nav,
      .doctor-card-tabs .ant-tabs-nav {
        margin: 0;
      }

      .patient-card-tabs .ant-tabs-tab,
      .doctor-card-tabs .ant-tabs-tab {
        height: 40px;
        border-radius: 0 !important;
        border-top: 0 !important;
        margin: 0 !important;
      }

      .patient-card-tabs .ant-tabs-tab-active {
        background: #fff !important;
      }

      .patient-stats {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--theme-line);
        border-radius: 4px;
        overflow: hidden;
        background: #fff;
      }

      .patient-stats-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 12px;
        height: 28px;
        font-size: 14px;
        color: var(--theme-text-2);
      }

      .patient-stats-item + .patient-stats-item {
        border-left: 1px solid var(--theme-line);
      }

      .patient-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
      }

      .patient-dot--green {
        background: #20b26b;
      }

      .patient-dot--orange {
        background: #f3ab1b;
      }

      .patient-dot--red {
        background: #e03134;
      }

      .summary-main {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 8px;
        min-width: 0;
        flex: 1 1 auto;
        overflow: hidden;
        white-space: nowrap;
      }

      .summary-name {
        font-weight: 700;
        font-size: 18px;
        line-height: 1;
      }

      .summary-meta {
        color: var(--theme-text-2);
        font-size: 12px;
      }

      .summary-number {
        color: var(--theme-text);
        font-weight: 700;
        font-size: 14px;
      }

      .summary-tag-warn {
        border-radius: 10px;
        padding-inline: 8px;
        flex: 0 0 auto;
      }

      .summary-actions {
        flex: 0 0 auto;
        flex-wrap: nowrap;
        justify-content: flex-end;
        white-space: nowrap;
      }

      .summary-links,
      .summary-major {
        flex: 0 0 auto;
        flex-wrap: nowrap;
        white-space: nowrap;
      }

      .content-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 8px;
        flex: 1;
        min-height: 0;
        width: 100%;
        max-width: 100%;
        overflow: hidden;
      }

      .record-panel,
      .diagnosis-panel,
      .orders-panel {
        border-radius: 0 !important;
        box-shadow: none !important;
      }

      .record-panel .ant-card-body,
      .diagnosis-panel .ant-card-body,
      .orders-panel .ant-card-body {
        padding: 0 !important;
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }

      .record-panel-wrap,
      .right-stack {
        min-width: 0;
        min-height: 0;
        width: 100%;
        height: 100%;
      }

      .right-stack {
        display: grid;
        grid-template-rows: 166px minmax(0, 1fr);
        gap: 8px;
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 12px;
      }

      .record-head {
        background: #ebf4ff;
        border-bottom: 1px solid var(--theme-line);
      }

      .record-vitals {
        height: 28px;
        padding: 0 12px;
        border-radius: 14px;
        background: #dbe9fb;
        display: inline-flex;
        align-items: center;
        gap: 16px;
        font-size: 12px;
        color: var(--theme-text-2);
      }

      .record-vitals strong {
        color: var(--theme-text);
        font-weight: 400;
        font-size: 14px;
      }

      .record-toolbar {
        padding: 8px 12px;
        border-bottom: 1px solid var(--theme-line-soft);
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: wrap;
      }

      .record-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 36px;
        height: 100%;
        flex: 1 1 auto;
        background: #f2f3f5;
        overflow: hidden;
      }

      .record-paper-stage {
        position: relative;
        padding: 12px 0 18px;
        background: #e6e7ea;
        overflow-x: auto;
        overflow-y: auto;
        min-height: 0;
      }

      .record-timeline {
        position: sticky;
        left: 0;
        top: 0;
        z-index: 2;
        margin: 0 0 8px 20px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px 0 12px;
        height: 28px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(2px);
      }

      .record-timeline::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #6bc241;
      }

      .record-paper {
        width: 794px;
        min-height: 940px;
        margin: 0 auto;
        background: #fff;
        box-shadow: inset 0 0 0 1px #f1f1f1;
        padding: 30px 48px 56px;
        color: #222;
        font-family: "Songti SC", "SimSun", serif;
      }

      .record-paper h1 {
        margin: 0 0 10px;
        text-align: center;
        font-size: 17px;
        font-weight: 700;
      }

      .record-paper-header {
        display: grid;
        grid-template-columns: repeat(5, max-content);
        justify-content: space-between;
        gap: 10px 18px;
        font-size: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid #cfcfcf;
      }

      .record-paper-header em,
      .record-em-red {
        color: #c72a2a;
        font-style: normal;
      }

      .record-paragraphs {
        font-size: 12px;
        line-height: 1.72;
        padding-top: 12px;
      }

      .record-paragraphs p {
        margin: 0;
      }

      .record-section-title {
        color: #245bcc;
      }

      .record-side-tabs {
        background: linear-gradient(180deg, #f9fafc 0%, #eceef2 100%);
        border-left: 1px solid var(--theme-line);
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }

      .record-side-tab {
        width: 36px;
        min-height: 56px;
        border-bottom: 1px solid #dcdfe3;
        color: #585858;
        font-size: 14px;
        line-height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        writing-mode: vertical-rl;
        letter-spacing: 2px;
        background: linear-gradient(180deg, #f8fafc 0%, #eceef2 100%);
      }

      .record-side-tab.active {
        background: #fff;
      }

      .diagnosis-actions,
      .orders-actions,
      .orders-quick-actions,
      .orders-secondary-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .action-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: #2469f2;
        font-size: 14px;
      }

      .diagnosis-table-wrap,
      .orders-table-wrap {
        padding: 0 8px 8px;
        min-height: 0;
      }

      .diagnosis-table-wrap {
        flex: 1 1 auto;
        overflow: auto;
      }

      .orders-table-wrap {
        flex: 1 1 auto;
        overflow-x: auto;
        overflow-y: auto;
      }

      .orders-table-wrap .ant-table-wrapper {
        height: 100%;
      }

      .orders-table-wrap .ant-spin-nested-loading,
      .orders-table-wrap .ant-spin-container,
      .orders-table-wrap .ant-table,
      .orders-table-wrap .ant-table-container {
        height: 100%;
      }

      .diagnosis-table-wrap .ant-table,
      .orders-table-wrap .ant-table {
        border-radius: 0 !important;
      }

      .diagnosis-table-wrap .ant-table-thead > tr > th,
      .orders-table-wrap .ant-table-thead > tr > th {
        height: 32px;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
        font-weight: 700;
        color: var(--theme-text);
      }

      .diagnosis-table-wrap .ant-table-tbody > tr > td,
      .orders-table-wrap .ant-table-tbody > tr > td {
        height: 32px;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
      }

      .diagnosis-table-wrap .ant-table-cell,
      .orders-table-wrap .ant-table-cell {
        white-space: nowrap;
        vertical-align: middle;
      }

      .diagnosis-table-wrap .ant-input,
      .diagnosis-table-wrap .ant-select-selector,
      .diagnosis-table-wrap .ant-picker,
      .orders-filter-input.ant-input {
        border-radius: 4px !important;
      }

      .compact-cell {
        padding: 2px 0 !important;
      }

      .toolbar-note {
        color: var(--theme-text-3);
      }

      .orders-tabs-row,
      .orders-toolbar-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
      }

      .orders-tabs-row {
        border-bottom: 1px solid var(--theme-line);
      }

      .orders-toolbar-row {
        border-bottom: 1px solid var(--theme-line-soft);
      }

      .orders-tab-inline {
        min-width: 0;
        flex: 1;
      }

      .orders-card-tabs .ant-tabs-nav {
        margin: 0 !important;
      }

      .orders-card-tabs .ant-tabs-tab {
        padding: 6px 16px !important;
      }

      .orders-card-tabs .ant-tabs-content-holder {
        display: none;
      }

      .orders-aux-input {
        width: 340px;
      }

      .orders-footer {
        flex: 0 0 auto;
        height: 32px;
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 0 12px;
        border-top: 1px solid var(--theme-line);
        font-size: 12px;
        color: var(--theme-text);
        background: #fff;
        white-space: nowrap;
        overflow: auto;
      }

      .amount-strong {
        font-weight: 700;
      }

      .side-toolbar {
        position: absolute;
        top: 40px;
        right: 0;
        bottom: 0;
        width: 64px;
        background: #f6f7f9;
        border-left: 1px solid var(--theme-line);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 20;
      }

      .side-toolbar-head {
        height: 40px;
        padding: 0 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid var(--theme-line);
        font-size: 14px;
        font-weight: 700;
        gap: 4px;
      }

      .side-toolbar-items {
        flex: 1;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .side-toolbar-item {
        height: 42px;
        padding: 0 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid var(--theme-line);
        font-size: 12px;
        color: #444;
        text-align: center;
        line-height: 1.2;
      }

      .side-toolbar-item.active {
        background: #e8f1ff;
        color: var(--theme-blue);
        font-weight: 700;
      }

      .summary-links .ant-btn-link {
        padding-inline: 2px;
      }

      .summary-major .ant-btn,
      .patient-right .ant-btn,
      .orders-tabs-row .ant-btn,
      .panel-header .ant-btn {
        box-shadow: none;
      }

      .ant-input-affix-wrapper,
      .ant-input,
      .ant-select-selector,
      .ant-picker,
      .ant-btn {
        font-size: 14px;
      }

      .ant-badge-count {
        box-shadow: none !important;
      }

      .patient-input {
        width: 160px;
      }

      .patient-card-tabs .ant-tabs-tab-btn,
      .doctor-card-tabs .ant-tabs-tab-btn,
      .orders-card-tabs .ant-tabs-tab-btn {
        font-size: 14px;
      }

      .patient-card-tabs .ant-tabs-tab-active .ant-tabs-tab-btn {
        font-weight: 700;
      }

      .muted-text {
        color: var(--theme-text-3);
      }

      .ops-icons {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--theme-blue);
        font-size: 16px;
      }

      .table-status-tag {
        min-width: 46px;
        text-align: center;
        border-radius: 4px;
      }

      .icon-text-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .diagnosis-actions .ant-btn-link,
      .orders-actions .ant-btn-link,
      .orders-secondary-actions .ant-btn-link,
      .record-toolbar .ant-btn-link {
        height: 24px;
        padding: 0 4px;
      }

      .diagnosis-panel .ant-table-wrapper,
      .orders-panel .ant-table-wrapper {
        overflow: hidden;
        height: 100%;
      }

      .record-panel,
      .diagnosis-panel,
      .orders-panel {
        height: 100%;
      }

      .referral-modal {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .referral-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
        padding: 12px 16px;
        background: #f2f8ff;
        border: 1px solid #d9e8ff;
        border-radius: 4px;
        font-size: 14px;
      }

      .referral-meta strong {
        color: var(--theme-text);
      }

      .referral-filters {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr)) auto auto;
        gap: 12px;
        align-items: end;
      }

      .referral-field {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .referral-field label {
        font-size: 12px;
        color: var(--theme-text-2);
      }

      .referral-table-wrap {
        border: 1px solid var(--theme-line);
        border-radius: 4px;
        overflow: hidden;
      }

      .referral-helper {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
        color: var(--theme-text-2);
      }

      .ant-card-head {
        min-height: unset !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script src="./vendor/dayjs.min.js"></script>
    <script src="./vendor/antd.min.js"></script>
    <script src="./vendor/ant-design-icons.umd.min.js"></script>
    <script src="./vendor/babel.min.js"></script>

    <script type="text/babel">
      const {
        ConfigProvider,
        App: AntApp,
        Button,
        Input,
        Tabs,
        Tag,
        Badge,
        Avatar,
        Space,
        Radio,
        Card,
        Table,
        Select,
        Checkbox,
        Modal,
        DatePicker,
      } = antd;

      const Icons = window.icons || window.antdIcons || {};
      const {
        MenuFoldOutlined,
        BellOutlined,
        SearchOutlined,
        IdcardOutlined,
        MenuOutlined,
        ReloadOutlined,
        HistoryOutlined,
        FileTextOutlined,
        GlobalOutlined,
        PlusCircleOutlined,
        RollbackOutlined,
        StopOutlined,
        StarOutlined,
        AppstoreOutlined,
        EyeOutlined,
        DeleteOutlined,
        PrinterOutlined,
        EllipsisOutlined,
        SaveOutlined,
        CheckCircleOutlined,
        PlusOutlined,
        CalendarOutlined,
        MedicineBoxOutlined,
        ExperimentOutlined,
        FileDoneOutlined,
        AuditOutlined,
        ScissorOutlined,
        SafetyCertificateOutlined,
        MoreOutlined,
        LeftCircleOutlined,
        RightCircleOutlined,
        UpCircleOutlined,
        DownCircleOutlined,
      } = Icons;

      const themeConfig = {
        token: {
          colorPrimary: "#2469f2",
          colorInfo: "#2469f2",
          colorSuccess: "#29a33e",
          colorWarning: "#e5710b",
          colorError: "#e03134",
          colorTextBase: "#262626",
          borderRadius: 4,
          colorPrimaryHover: "#4d94ff",
          colorPrimaryActive: "#215ed9",
          colorSuccessBg: "#f2fff4",
          colorSuccessBgHover: "#d4fad9",
          colorLinkActive: "#215ed9",
          colorLinkHover: "#4d94ff",
          colorBorder: "#dbdbdb",
          wireframe: false,
          colorBorderSecondary: "#eeeeee",
          boxShadowSecondary: "0 0 16px 0 rgba(0, 0, 0, 0.12)",
          colorText: "#262626",
          colorTextSecondary: "#666666",
          colorTextTertiary: "#999999",
          colorPrimaryTextHover: "#4d94ff",
          colorPrimaryTextActive: "#215ed9",
          colorSuccessHover: "#40b854",
          colorSuccessTextHover: "#40b854",
          colorSuccessTextActive: "#187828",
          colorSuccessActive: "#187828",
          colorPrimaryBg: "#f2f8ff",
          colorPrimaryBgHover: "#e0efff",
          colorPrimaryBorder: "#bddcff",
          colorPrimaryBorderHover: "#99c9ff",
          colorSuccessBorder: "#b2edba",
          colorSuccessBorderHover: "#8fdb99",
          colorWarningHover: "#f78e31",
          colorWarningActive: "#c2600a",
          colorWarningTextActive: "#c2600a",
          colorWarningTextHover: "#f78e31",
          colorWarningBg: "#fff5eb",
          colorWarningBgHover: "#ffecd9",
          colorWarningBorder: "#ffdbb8",
          colorWarningBorderHover: "#ffc78f",
          colorErrorHover: "#e55350",
          colorErrorTextHover: "#e55350",
          colorErrorTextActive: "#bd2628",
          colorErrorActive: "#bd2628",
          colorErrorBg: "#fff3f2",
          colorErrorBgHover: "#ffe7e5",
          colorErrorBorder: "#ffcfcc",
          colorErrorBorderHover: "#ffaaa6",
        },
        components: {
          Table: {
            borderColor: "rgb(219,219,219)",
            headerBg: "rgb(238,238,238)",
            rowHoverBg: "rgb(242,248,255)",
            rowSelectedBg: "rgb(224,239,255)",
            headerBorderRadius: 0,
            cellPaddingInline: 8,
            cellPaddingInlineSM: 4,
            cellPaddingBlock: 8,
          },
          Button: {

                                <div key={item} className={`record-side-tab ${index === 0 ? "active" : ""}`}>

                              <DownCircleOutlined style={{ color: "#2469f2" }} />
                            </Space>

                                size="small"

                        <span>病案号：<strong>0611143505</strong></span>

                            value={referralFilters.date ? dayjs(referralFilters.date) : null}

                            style={{ width: "100%" }}
                            allowClear

                            value={referralFilters.type}

                            showSearch
                            optionFilterProp="label"

                          dataSource={filteredReferralResources}

                          scroll={{ x: "max-content", y: 420 }}
                          rowSelection={{
                            type: "radio",
                            selectedRowKeys: selectedReferralKey ? [selectedReferralKey] : [],
                            onChange: (keys) => setSelectedReferralKey(keys[0]),
                          }}
                          onRow={(record) => ({
                            onClick: () => setSelectedReferralKey(record.key),
                          })}
                        />
                      </div>
                    </div>
                  </Modal>
          </div>

      const App = () => (
        <ConfigProvider theme={themeConfig}>
          <AntApp>
            <WorkbenchPage />
          </AntApp>
        </ConfigProvider>

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
